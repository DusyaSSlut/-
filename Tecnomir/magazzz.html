<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина - Техномир</title>
    <link rel="stylesheet" href="csski/main.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="cart.js"></script>
</head>
<body>
    <main>
        <header>
            <div class="container">
                <a href="index.html" class="logo-link">
                    <img src="img/logo.png" alt="Техномир" class="logo-image">
                </a>
                <div class="header-actions">
                    <div class="contacts-text">
                        <a href="tel:+996XXXXXXXXX" class="contact-phone">+996 XXX XXX XXX</a>
                        <a href="tel:+996XXXXXXXXX" class="contact-phone">+996 XXX XXX XXX</a>
                    </div>
                    <div class="search-container">
                        <input type="text" class="search-input" placeholder="Поиск...">
                        <button class="search-btn">🔍</button>
                        <button class="clear-btn">✕</button>
                    </div>
                </div>
            </div>
        </header>

        <nav class="main-nav">
            <div class="container">
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">Главная</a></li>
                    <li><a href="catalog.html" class="nav-link">Каталог</a></li>
                    <li><a href="magazzz.html" class="nav-link active">Корзина</a></li>
                    <li><a href="orders.html" class="nav-link">Мои заказы</a></li>
                </ul>
            </div>
        </nav>

        <section class="cart-page">
            <div class="container">
                <h1 class="cart-title">Корзина</h1>
                <div id="cartContent"></div>
            </div>
        </section>

        <footer class="footer">
            <div class="container">
                <div class="footer-content">
                    <div class="footer-logo">
                        <img src="img/logo.png" alt="Техномир" class="footer-logo-img">
                        <p class="footer-description">Магазин компьютерной техники</p>
                    </div>
                   
                    <div class="footer-contacts">
                        <h4>Контакты</h4>
                        <p>tehnomir.kg</p>
                    </div>
                </div>
                <div class="footer-bottom">
                    <p>© 2026 Техномир. Все права защищены.</p>
                </div>
            </div>
        </footer>
    </main>
    <script>

    async function loadColorsForCatalog() {
        await initSupabase();
        const { data: settings } = await supabaseClient.from('site_settings').select('*');
        if (settings) {
            settings.forEach(s => {
                if (s.key === 'color_dark') document.documentElement.style.setProperty('--dark-blue', s.value);
                if (s.key === 'color_deep') document.documentElement.style.setProperty('--deep-teal', s.value);
                if (s.key === 'color_medium') document.documentElement.style.setProperty('--medium-teal', s.value);
                if (s.key === 'color_light') document.documentElement.style.setProperty('--light-teal', s.value);
                if (s.key === 'color_white') document.documentElement.style.setProperty('--white', s.value);
            });
        }
    }
    
    loadColorsForCatalog();
    
</script>

<script>
    async function loadSiteSettings() {
        try {
            await initSupabase();
            
            if (!supabaseClient) {
                console.log('supabaseClient не инициализирован');
                return;
            }
            
            const { data: settings, error } = await supabaseClient.from('site_settings').select('*');
            
            if (error) {
                console.error('Ошибка загрузки:', error);
                return;
            }
            
            if (settings && settings.length > 0) {
                settings.forEach(s => {
                   
                    if (s.key === 'color_dark') document.documentElement.style.setProperty('--dark-blue', s.value);
                    if (s.key === 'color_deep') document.documentElement.style.setProperty('--deep-teal', s.value);
                    if (s.key === 'color_medium') document.documentElement.style.setProperty('--medium-teal', s.value);
                    if (s.key === 'color_light') document.documentElement.style.setProperty('--light-teal', s.value);
                    if (s.key === 'color_white') document.documentElement.style.setProperty('--white', s.value);
                    
                  
                  
                    if (s.key === 'phone1') {
                        const phones = document.querySelectorAll('.contact-phone');
                        if (phones[0]) phones[0].innerText = s.value;
                    }
                    if (s.key === 'phone2') {
                        const phones = document.querySelectorAll('.contact-phone');
                        if (phones[1]) phones[1].innerText = s.value;
                    }
                    
                 
                    if (s.key === 'copyright') {
                        const footer = document.querySelector('.footer-bottom p');
                        if (footer) footer.innerText = s.value;
                    }
                });
            }
        } catch (err) {
            console.error('Ошибка:', err);
        }
    }
    
    document.addEventListener('DOMContentLoaded', loadSiteSettings);
</script>
</body>
</html>
</body>
</html>

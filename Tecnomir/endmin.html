<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактор главной страницы</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui;background:#f5f5f5;padding:20px}
        .container{max-width:800px;margin:0 auto}
        .header{background:#17252A;color:#fff;padding:20px;border-radius:12px;margin-bottom:30px;display:flex;justify-content:space-between}
        .card{background:#fff;padding:20px;border-radius:12px;margin-bottom:20px}
        h3{margin-bottom:15px;color:#17252A}
        label{display:block;margin-bottom:5px;font-weight:bold}
        input,select{width:100%;padding:10px;margin-bottom:15px;border:1px solid #ddd;border-radius:8px}
        .color-row{display:flex;gap:15px;flex-wrap:wrap;margin-bottom:20px}
        .color-item{flex:1;min-width:100px}
        .color-item input{height:50px;padding:5px}
        button{background:#3AAFA9;color:#fff;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-weight:bold}
        button:hover{background:#287A78}
        .slide-item{background:#f9f9f9;padding:15px;border-radius:8px;margin-bottom:15px}
        .slide-item input{margin-bottom:8px}
        .toast{position:fixed;bottom:20px;right:20px;background:#17252A;color:#fff;padding:10px 20px;border-radius:8px;opacity:0;transition:0.3s;z-index:9999}
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1> Редактор главной страницы</h1><a href="index.html" style="color:#3AAFA9">На сайт</a></div>
    <div class="card">
        <h3> Цвета сайта</h3>
        <div class="color-row">
            <div class="color-item"><label></label><input type="color" id="color_dark" value="#17252A"></div>
            <div class="color-item"><label> </label><input type="color" id="color_deep" value="#287A78"></div>
            <div class="color-item"><label></label><input type="color" id="color_medium" value="#3AAFA9"></div>
            <div class="color-item"><label></label><input type="color" id="color_light" value="#DEF2F1"></div>
            <div class="color-item"><label></label><input type="color" id="color_white" value="#FEFFFF"></div>
        </div>
        <button onclick="saveColors()"> Сохранить цвета</button>
    </div>
    <div class="card">
        <h3> Текст на главной</h3>
        <input type="text" id="carousel_title" placeholder="Заголовок категории" value="Популярные категории">
        <input type="text" id="brands_title" placeholder="Заголовок бренды" value="Популярные бренды">
        <input type="text" id="phone1" placeholder="Телефон 1" value="+996 XXX XXX XXX">
        <input type="text" id="phone2" placeholder="Телефон 2" value="+996 XXX XXX XXX">
        <input type="text" id="copyright" placeholder="Копирайт" value="© 2026 Техномир. Все права защищены.">
        <button onclick="saveTexts()"> Сохранить текст</button>
    </div>
    <div class="card">
        <h3> Карусель</h3>
        <div id="carouselList"></div>
        <button onclick="saveCarousel()"> Сохранить карусель</button>
    </div>
</div>
<div id="toast" class="toast"></div>

<script>
const SUPABASE_URL = 'https://dtamewvkovpqpmtmcnhw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0YW1ld3Zrb3ZwcXBtdG1jbmh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMTQxNTIsImV4cCI6MjA5MTU5MDE1Mn0.wruJ5hUvyBYBydE_A_xJ7ioK4-9JgNwbWHm_svUh4as';

let supabaseClient = null;
function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.innerText = msg;
    toast.style.opacity = '1';
    setTimeout(() => { toast.style.opacity = '0'; }, 2000);
}

async function init() {
    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    await loadSettings();
    await loadCarousel();
}
async function loadSettings() {
    const { data } = await supabaseClient.from('site_settings').select('*');
    if (data) {
        data.forEach(s => {
            let el = document.getElementById(s.key);
            if (el) el.value = s.value;
        });
    }
}
async function loadCarousel() {
    const { data } = await supabaseClient.from('carousel').select('*').order('sort_order');
    const container = document.getElementById('carouselList');
    container.innerHTML = '';
    if (data) {
        data.forEach((slide, i) => {
            container.innerHTML += `
                <div class="slide-item">
                    <div style="font-size:12px;color:#666;margin-bottom:5px">Слайд ${i+1}</div>
                    <input type="text" id="carousel_title_${i}" value="${escapeHtml(slide.title)}" placeholder="Заголовок">
                    <input type="text" id="carousel_text_${i}" value="${escapeHtml(slide.text)}" placeholder="Текст">
                    <input type="text" id="carousel_img_${i}" value="${slide.img}" placeholder="Путь к картинке">
                </div>
            `;
        });
    }
}

function escapeHtml(str) {
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
}

async function saveColors() {
    const colors = ['color_dark', 'color_deep', 'color_medium', 'color_light', 'color_white'];
    for (let key of colors) {
        await supabaseClient.from('site_settings').update({ value: document.getElementById(key).value }).eq('key', key);
    }
    showToast('Цвета сохранены');
}

async function saveTexts() {
    const texts = ['carousel_title', 'brands_title', 'phone1', 'phone2', 'copyright'];
    for (let key of texts) {
        await supabaseClient.from('site_settings').update({ value: document.getElementById(key).value }).eq('key', key);
    }
    showToast('Текст сохранён');
}

async function saveCarousel() {
    const { data: existing } = await supabaseClient.from('carousel').select('id').order('sort_order');
    for (let i = 0; i < existing.length; i++) {
        const title = document.getElementById(`carousel_title_${i}`).value;
        const text = document.getElementById(`carousel_text_${i}`).value;
        const img = document.getElementById(`carousel_img_${i}`).value;
        await supabaseClient.from('carousel').update({ title, text, img }).eq('id', existing[i].id);
    }
    showToast('Карусель сохранена');
}
async function init() {
    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    const saved = localStorage.getItem('technomir_user');
    if (!saved) {
        window.location.href = 'login.html';
        return;
    }
    
    const user = JSON.parse(saved);
    if (user.role !== 'admin') {
        alert('Доступ только для администратора');
        window.location.href = 'index.html';
        return;
    }
    
    await loadSettings();
    await loadCarousel();
}
init();
</script>
</body>
</html>

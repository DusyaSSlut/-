<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Техномир</title>
    <link rel="stylesheet" href="csski/main.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
</head>
<body>
    <div class="register-container">
        <div class="register-box">
            <h1>Регистрация</h1>
            <input type="text" id="username" placeholder="Логин">
            <input type="password" id="password" placeholder="Пароль">
            <input type="password" id="confirmPassword" placeholder="Подтвердите пароль">
            <button id="registerBtn">Зарегистрироваться</button>
            <div class="info">
                <a href="login.html">Уже есть аккаунт? Войти</a>
            </div>
            <div id="errorMsg" class="error"></div>
        </div>
    </div>

    <script>
        const registerBtn = document.getElementById('registerBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const errorMsg = document.getElementById('errorMsg');

        async function doRegister() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const confirm = confirmInput.value;
            
            if (!username) {
                errorMsg.innerText = 'Введите логин';
                return;
            }
            if (username.length < 3) {
                errorMsg.innerText = 'Логин должен быть не менее 3 символов';
                return;
            }
            if (!password) {
                errorMsg.innerText = 'Введите пароль';
                return;
            }
            if (password.length < 4) {
                errorMsg.innerText = 'Пароль должен быть не менее 4 символов';
                return;
            }
            if (password !== confirm) {
                errorMsg.innerText = 'Пароли не совпадают';
                return;
            }
            
            await initSupabase();
            
            const { data: existing } = await supabaseClient
                .from('users')
                .select('username')
                .eq('username', username);
            
            if (existing && existing.length > 0) {
                errorMsg.innerText = 'Этот логин уже занят';
                return;
            }
            
            const { data, error } = await supabaseClient
                .from('users')
                .insert([{
                    username: username,
                    password: password,
                    role: 'user'
                }])
                .select();
            
            if (error) {
                errorMsg.innerText = 'Ошибка: ' + error.message;
                return;
            }
            
            const newUser = data[0];
            localStorage.setItem('technomir_user', JSON.stringify(newUser));
            window.location.href = 'index.html';
        }
        
        registerBtn.onclick = doRegister;
    </script>
</body>
</html>
